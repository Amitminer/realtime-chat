services:
  backend:
    image: local/realtime-chat-backend:dev
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - HOST=${BACKEND_HOST:-0.0.0.0}
      - PORT=${BACKEND_PORT:-9001}
      - SERVER_PASSWORD=${SERVER_PASSWORD:-change-me}
      - RUST_BACKTRACE=1
    command: ["/usr/local/bin/realtime-chat"]
    tty: true
    stdin_open: true
    ports:
      - "9001:9001"
    restart: unless-stopped

  frontend:
    image: local/realtime-chat-frontend:dev
    build:
      context: .
      dockerfile: http-serve/Dockerfile
    environment:
      - HOST=${FRONTEND_HOST:-0.0.0.0}
      - PORT=${FRONTEND_PORT:-8080}
      - ROOT_DIR=/app/frontend
      - LIVE_RELOAD=false
      - WS_URL=${WS_URL:-ws://backend:9001}
    # Entrypoint runs http-serve and validates ROOT_DIR
    tty: true
    stdin_open: true
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped
